[build]
  publish = "."
  functions = "netlify/functions"

# Same URL as local server.js so the existing client works unchanged.
[[redirects]]
  from = "/api/archive"
  to = "/.netlify/functions/archive"
  status = 200
  force = true

[[redirects]]
  from = "/api/embed"
  to = "/.netlify/functions/embed"
  status = 200
  force = true
